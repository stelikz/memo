
<div style="padding: 1rem 0;">
  <p style="font-size: 12px; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; margin: 0 0 8px; text-align: center;">9 / 10 — Review complete</p>
  <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 20px; max-width: 340px; margin: 0 auto;">
    <div style="display: flex; justify-content: space-between; font-size: 12px; color: var(--color-text-tertiary); margin-bottom: 16px;">
      <span>9:41</span>
      <span style="letter-spacing: 2px;">···</span>
    </div>
    <div style="background: var(--color-background-primary); border-radius: var(--border-radius-lg); padding: 20px 16px; min-height: 520px; display: flex; flex-direction: column; align-items: center; justify-content: center;">

      <div style="width: 56px; height: 56px; border-radius: 50%; background: #EAF3DE; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; font-size: 24px; color: #27500A;">✓</div>

      <p style="font-size: 22px; font-weight: 500; margin: 0 0 4px;">Bien joué!</p>
      <p style="font-size: 14px; color: var(--color-text-secondary); margin: 0 0 32px;">You've finished today's review</p>

      <!-- Session stats -->
      <div style="width: 100%; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-bottom: 32px;">
        <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px; text-align: center;">
          <p style="font-size: 11px; color: var(--color-text-secondary); margin: 0 0 2px; text-transform: uppercase; letter-spacing: 0.5px;">Reviewed</p>
          <p style="font-size: 22px; font-weight: 500; margin: 0;">18</p>
        </div>
        <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px; text-align: center;">
          <p style="font-size: 11px; color: var(--color-text-secondary); margin: 0 0 2px; text-transform: uppercase; letter-spacing: 0.5px;">Streak</p>
          <p style="font-size: 22px; font-weight: 500; margin: 0;">13 days</p>
        </div>
      </div>

      <!-- Breakdown -->
      <div style="width: 100%; margin-bottom: 32px;">
        <p style="font-size: 13px; color: var(--color-text-secondary); margin: 0 0 10px;">This session</p>
        <div style="display: flex; gap: 4px; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 10px;">
          <div style="flex: 2; background: #F09595;"></div>
          <div style="flex: 3; background: #FAC775;"></div>
          <div style="flex: 9; background: #97C459;"></div>
          <div style="flex: 4; background: #85B7EB;"></div>
        </div>
        <div style="display: flex; justify-content: space-between; font-size: 12px;">
          <span style="color: #791F1F;">2 again</span>
          <span style="color: #633806;">3 hard</span>
          <span style="color: #27500A;">9 good</span>
          <span style="color: #0C447C;">4 easy</span>
        </div>
      </div>

      <div style="width: 100%; display: flex; flex-direction: column; gap: 10px;">
        <div style="background: var(--color-text-primary); color: var(--color-background-primary); border-radius: var(--border-radius-md); padding: 14px; text-align: center; font-size: 15px; font-weight: 500; cursor: pointer;">Go home</div>
        <div style="border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 14px; text-align: center; font-size: 15px; color: var(--color-text-secondary); cursor: pointer;">Add a word</div>
      </div>
    </div>
  </div>
</div>
